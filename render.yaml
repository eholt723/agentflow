services:
  - type: web
    name: agentflow
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: DB_PATH
        value: /tmp/agentflow.db   # ephemeral on free tier; resets on restart
      - key: N8N_ENABLED
        value: "false"
