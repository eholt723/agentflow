name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install "pytest>=8.0" "pytest-asyncio>=0.23" "httpx>=0.27"

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        run: |
          git remote add space https://eholt723:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/eholt723/AgentFlow
          git push space main --force
